<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário - Agrolab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        @media (max-width: 576px) {
            .card-dado .valor { font-size: 1.4rem; }
            .card-dado .icone { font-size: 1.4rem; }
            .chart-container { height: 250px; }
            .navbar-brand { font-size: 1.1rem; }
        }
        :root {
            --verde-escuro: #2d4a3e;
            --verde-medio: #4a7c59;
            --bege: #f5f1e8;
            --laranja: #c67b3a;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bege) 0%, #e8dcc8 100%);
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(135deg, var(--verde-escuro) 0%, #1a3328 100%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .card-cadastro {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            margin: 2rem auto;
        }
        .btn-success {
            background: var(--verde-medio);
            border: none;
            border-radius: 30px;
            font-weight: 600;
        }
        .btn-success:hover {
            background: var(--verde-escuro);
        }
        .form-control, .form-select {
            border-radius: 30px;
            background: rgba(255,255,255,0.6);
            border: 1px solid var(--verde-medio);
        }
    </style>
</head>
<body>
<!-- Navbar igual às outras páginas -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <i class="fa-solid fa-sun-plant-wilt" style="color: var(--laranja);"></i> Agrolab
        </a>
        <div class="ms-auto d-flex align-items-center">
            <span id="user-info" class="text-white me-3"></span>
            <form action="/logout" method="post" style="display:inline;">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="fa-solid fa-right-from-bracket"></i> Sair
                </button>
            </form>
        </div>
    </div>
</nav>

<!-- Conteúdo centralizado -->
<div class="card-cadastro text-center">
    <h4 class="mb-4" style="color: var(--verde-escuro);">
        <i class="fa-solid fa-user-plus"></i> Cadastrar Novo Usuário
    </h4>
    <form id="form-cadastro">
        <div class="mb-3 text-start">
            <label class="form-label">Nome de usuário</label>
            <input type="text" id="username" class="form-control" required>
        </div>
        <div class="mb-3 text-start">
            <label class="form-label">Senha</label>
            <input type="password" id="password" class="form-control" required>
        </div>
        <div class="mb-3 text-start">
            <label class="form-label">Perfil</label>
            <select id="role" class="form-select">
                <option value="USER">Usuário Comum</option>
                <option value="ADMIN">Administrador</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success w-100 mt-3">
            <i class="fa-solid fa-floppy-disk"></i> Criar Usuário
        </button>
    </form>
    <div id="mensagem" class="mt-3 small"></div>
</div>

<script>
    // Exibe o nome do usuário logado
    async function carregarUsuarioAtual() {
        try {
            const resp = await fetch('/api/usuario/atual');
            const data = await resp.json();
            document.getElementById('user-info').innerHTML = `<i class="fa-solid fa-user"></i> ${data.username}`;
        } catch (e) {
            console.error(e);
        }
    }
    carregarUsuarioAtual();

    // Submissão do formulário de cadastro
    document.getElementById('form-cadastro').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const role = document.getElementById('role').value;

        try {
            const resp = await fetch('/api/usuarios', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role })
            });
            const data = await resp.json();
            const msgDiv = document.getElementById('mensagem');
            if (resp.ok) {
                msgDiv.innerHTML = `<span class="text-success"><i class="fa-solid fa-circle-check"></i> ${data.message}</span>`;
                document.getElementById('form-cadastro').reset();
            } else {
                msgDiv.innerHTML = `<span class="text-danger"><i class="fa-solid fa-circle-exclamation"></i> ${data.message || 'Erro ao cadastrar'}</span>`;
            }
        } catch (err) {
            document.getElementById('mensagem').innerHTML = '<span class="text-danger">Erro de conexão.</span>';
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
