<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agrolab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-escuro: #2d4a3e;
            --verde-medio: #4a7c59;
            --bege: #f5f1e8;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bege) 0%, #e8dcc8 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .login-card h3 {
            color: var(--verde-escuro);
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        .btn-login {
            background: var(--verde-medio);
            border: none;
            border-radius: 30px;
            padding: 0.6rem 2rem;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: var(--verde-escuro);
        }
        .form-control {
            border-radius: 30px;
            background: rgba(255,255,255,0.6);
            border: 1px solid var(--verde-medio);
        }
        .alert-danger {
            border-radius: 30px;
        }
    </style>
</head>
<body>
<div class="login-card text-center">
    <i class="fa-solid fa-sun-plant-wilt" style="font-size: 3rem; color: var(--verde-medio);"></i>
    <h3>Agrolab</h3>
    <div id="error-msg" class="alert alert-danger" style="display: none;">Usuário ou senha inválidos.</div>

    <form action="/login" method="post">
        <div class="mb-3 text-start">
            <label class="form-label">Usuário</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3 text-start">
            <label class="form-label">Senha</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-login w-100 mt-3">
            <i class="fa-solid fa-right-to-bracket"></i> Entrar
        </button>
    </form>
</div>

<script>
    if (window.location.search.includes('error')) {
        document.getElementById('error-msg').style.display = 'block';
    }
</script>
</body>
</html>
