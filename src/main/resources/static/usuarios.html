<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Usuários - Agrolab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-escuro: #2d4a3e;
            --verde-medio: #4a7c59;
            --bege: #f5f1e8;
            --laranja: #c67b3a;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bege) 0%, #e8dcc8 100%);
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(135deg, var(--verde-escuro) 0%, #1a3328 100%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .table-container {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            margin: 2rem auto;
        }
        .btn-success { background: var(--verde-medio); border: none; border-radius: 30px; }
        .btn-success:hover { background: var(--verde-escuro); }
        .btn-warning { border-radius: 30px; }
        .btn-danger { border-radius: 30px; }
        @media (max-width: 576px) {
            .navbar-brand { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <i class="fa-solid fa-sun-plant-wilt" style="color: var(--laranja);"></i> Agrolab
        </a>
        <div class="ms-auto d-flex align-items-center">
            <a id="btn-cadastro" href="/cadastro.html" class="btn btn-outline-light btn-sm me-2" style="display:none;">
                <i class="fa-solid fa-user-plus"></i> Cadastrar
            </a>
            <span id="user-info" class="text-white me-3"></span>
            <form action="/logout" method="post" style="display:inline;">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="fa-solid fa-right-from-bracket"></i> Sair
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="table-container">
        <h4 class="mb-4"><i class="fa-solid fa-users"></i> Gerenciar Usuários</h4>
        <div id="mensagem" class="alert d-none"></div>
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nome de Usuário</th>
                <th>Perfil</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody id="tabela-usuarios"></tbody>
        </table>
    </div>
</div>

<!-- Modal para editar usuário -->
<div class="modal fade" id="modalEditar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Usuário</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="mb-3">
                    <label>Nome de usuário</label>
                    <input type="text" id="edit-username" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Nova senha (deixe em branco para manter)</label>
                    <input type="password" id="edit-password" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Perfil</label>
                    <select id="edit-role" class="form-select">
                        <option value="USER">Usuário Comum</option>
                        <option value="ADMIN">Administrador</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="salvarEdicao()">Salvar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_BASE = '/api';

    async function carregarUsuarioAtual() {
        try {
            const resp = await fetch(`${API_BASE}/usuario/atual`);
            const data = await resp.json();
            document.getElementById('user-info').innerHTML = `<i class="fa-solid fa-user"></i> ${data.username}`;
            if (data.role === 'ADMIN') {
                document.getElementById('btn-cadastro').style.display = 'inline-block';
            }
        } catch (e) { console.error(e); }
    }
    carregarUsuarioAtual();

    async function listarUsuarios() {
        try {
            const resp = await fetch(`${API_BASE}/usuarios`);
            if (!resp.ok) throw new Error('Não autorizado');
            const usuarios = await resp.json();
            const tbody = document.getElementById('tabela-usuarios');
            tbody.innerHTML = '';
            usuarios.forEach(user => {
                tbody.innerHTML += `
                        <tr>
                            <td>${user.id}</td>
                            <td>${user.username}</td>
                            <td>${user.role}</td>
                            <td>
                                <button class="btn btn-warning btn-sm" onclick="abrirEditar(${user.id}, '${user.username}', '${user.role}')">
                                    <i class="fa-solid fa-pen-to-square"></i> Editar
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="deletarUsuario(${user.id})">
                                    <i class="fa-solid fa-trash"></i> Remover
                                </button>
                            </td>
                        </tr>`;
            });
        } catch (err) {
            console.error(err);
            mostrarMensagem('Erro ao carregar usuários.', 'danger');
        }
    }

    function abrirEditar(id, username, role) {
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-username').value = username;
        document.getElementById('edit-role').value = role;
        document.getElementById('edit-password').value = '';
        new bootstrap.Modal(document.getElementById('modalEditar')).show();
    }

    async function salvarEdicao() {
        const id = document.getElementById('edit-id').value;
        const username = document.getElementById('edit-username').value.trim();
        const password = document.getElementById('edit-password').value;
        const role = document.getElementById('edit-role').value;

        try {
            const resp = await fetch(`${API_BASE}/usuarios/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role })
            });
            if (!resp.ok) {
                const err = await resp.json();
                throw new Error(err.message || 'Erro');
            }
            bootstrap.Modal.getInstance(document.getElementById('modalEditar')).hide();
            listarUsuarios();
            mostrarMensagem('Usuário atualizado com sucesso.', 'success');
        } catch (error) {
            mostrarMensagem(error.message, 'danger');
        }
    }

    async function deletarUsuario(id) {
        if (!confirm('Tem certeza que deseja remover este usuário?')) return;
        try {
            const resp = await fetch(`${API_BASE}/usuarios/${id}`, { method: 'DELETE' });
            if (!resp.ok) throw new Error('Erro ao remover');
            listarUsuarios();
            mostrarMensagem('Usuário removido.', 'success');
        } catch (error) {
            mostrarMensagem(error.message, 'danger');
        }
    }

    function mostrarMensagem(msg, tipo) {
        const div = document.getElementById('mensagem');
        div.className = `alert alert-${tipo}`;
        div.textContent = msg;
        div.classList.remove('d-none');
        setTimeout(() => div.classList.add('d-none'), 3000);
    }

    listarUsuarios();
</script>
</body>
</html>
